name: DevSecOps Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node (IMPORTANT FIX)
        uses: actions/setup-node@v3
        with:
          node-version: '12'

      - name: Install Dependencies
        run: npm install

      - name: Run App Check
        run: ls -la
